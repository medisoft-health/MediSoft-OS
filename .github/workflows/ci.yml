# ────────────────────────────────────────────────────────────────
#  MediSoft C-OS — Continuous Integration
#
#  Runs on every push and pull request. Four gates:
#    1. TypeScript  — tsc --noEmit (catches type drift)
#    2. Lint        — eslint (catches code-style violations)
#    3. Test        — vitest run (198+ unit tests, ~1 s)
#    4. Build       — next build (catches RSC boundary errors,
#                     invalid page exports, missing modules)
#
#  All gates must pass before a PR can merge.
#
#  Environment:
#    - SKIP_ENV_VALIDATION=1 so @t3-oss/env-nextjs doesn't fail
#      without real secrets (no DB / AI keys in CI).
#    - Node 20.x (matches the dev environment; upgrade to 22 LTS
#      when ready).
#    - npm ci for reproducible installs from package-lock.json.
# ────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "app/medisoft-cos/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/medisoft-cos/**"
      - ".github/workflows/ci.yml"

# Cancel in-flight runs for the same branch/PR — saves CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app/medisoft-cos

env:
  SKIP_ENV_VALIDATION: "1"
  # Turbopack is the default in Next 16 dev, but `next build` uses
  # webpack by default. No special flag needed.
  NODE_ENV: production

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/medisoft-cos/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Gate 1: TypeScript ─────────────────────────────────────
      - name: Typecheck
        run: npm run typecheck

      # ── Gate 2: Lint ───────────────────────────────────────────
      - name: Lint
        run: npm run lint
        # Lint is advisory for now — don't block PRs on style until
        # the team agrees on the ruleset. Change to `continue-on-error: false`
        # when ready.
        continue-on-error: true

      # ── Gate 3: Tests ──────────────────────────────────────────
      - name: Test
        run: npm test

      # ── Gate 4: Production build ───────────────────────────────
      - name: Build
        run: npm run build
